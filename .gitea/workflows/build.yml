name: Build

on:
  push:
    branches: [ creation, testing, pre-release, main ]
  pull_request:
    branches: [ creation, testing, pre-release, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew --no-daemon --console=plain --warning-mode all test

      - name: Build with Gradle
        run: ./gradlew --no-daemon --console=plain --warning-mode all build --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        with:
          name: hivemind-mod-${{ github.ref_name }}-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: warn
          retention-days: 30
