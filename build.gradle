plugins {
	id 'fabric-loom' version "${loom_version}"
	id 'maven-publish'
	id 'com.diffplug.spotless' version '6.25.0'
	id 'checkstyle'
	id 'com.github.spotbugs' version '6.0.14'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	// Add repositories to retrieve artifacts from in here.
	// You should only use this when depending on other mods because
	// Loom adds the essential maven repositories to download Minecraft and libraries from automatically.
	// See https://docs.gradle.org/current/userguide/declaring_repositories.html
	// for more information about repositories.
	mavenCentral()
}

fabricApi {
	configureDataGeneration {
		client = true
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	
	// Testing
	testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
		// Mockito inline to allow mocking final classes (PersistentState subclasses)
		testImplementation 'org.mockito:mockito-inline:4.11.0'
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17

	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

// Integration test source set (disabled by default; requires Fabric test runtime)
sourceSets {
    integrationTest {
        java.srcDir file('src/integrationTest/java')
        resources.srcDir file('src/integrationTest/resources')
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

configurations.checkstyle {
	exclude group: 'com.google.collections', module: 'google-collections'
}

dependencies {
    // Integration tests typically require Fabric test libraries. Do NOT add them automatically here;
    // Instead, uncomment and add the appropriate artifacts when you run integration tests in a dev environment.
    // Example (commented):
    // integrationTestImplementation 'net.fabricmc:fabric-junit:1.0.0'
}

// Task to run integration tests (manual)
tasks.register('integrationTest', Test) {
    description = 'Runs integration tests against a running Minecraft server or Fabric test harness.'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
    // Disabled by default in CI; set -DintegrationTest=true to run locally
    onlyIf { project.hasProperty('integrationTest') }
}

// Do not wire integrationTest into check by default - run explicitly
// check.dependsOn integrationTest // Uncomment to include integration tests in the main check lifecycle


// Configure tests to use JUnit Jupiter
tasks.test {
    useJUnitPlatform()
}

// ============================================================================
// Static Analysis & Code Quality Configuration
// ============================================================================

// Spotless: Code formatting
spotless {
	java {
		target 'src/*/java/**/*.java'

		// Remove trailing whitespace
		trimTrailingWhitespace()
		// Ensure files end with newline
		endWithNewline()

		// Use Google's Java style guide
		googleJavaFormat('1.19.1').reflowLongStrings()

		// Additional fixes
		removeUnusedImports()
		formatAnnotations()
	}
}

// Checkstyle: Code style checking
checkstyle {
	toolVersion = '10.12.7'
	configFile = file('checkstyle.xml')
	showViolations = true
	ignoreFailures = false
}

tasks.withType(Checkstyle).configureEach {
	reports {
		xml.required = true
		html.required = true
	}
}

// SpotBugs: Bug detection
spotbugs {
	ignoreFailures = false
	reportLevel = 'medium'
	effort = 'default'
	excludeFilter = file('spotbugs-exclude.xml')
}

spotbugsMain {
	reports {
		html.required = true
		xml.required = true
	}
}

// Add quality checks to the default build verification
check.dependsOn spotlessCheck, checkstyleMain, spotbugsMain

// ============================================================================


jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}